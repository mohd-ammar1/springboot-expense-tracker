<!DOCTYPE html>
<html  xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignIn_Page</title>
    <link rel="stylesheet" th:href="@{/css/loginStyle.css}">
</head>
<body>

<div id="container">

    <form th:action="@{/login}" th:object="${login}" method="post">
        <label for="emailf">Email:</label>
        <input type="email" name="emailf" id="emailf" th:field="*{email}">
        <br>

        <label for="passwordf">Password:</label>
        <input type="password" name="passwordf" id="passwordf" th:field="*{password}">
        <br>

        <input type="submit" value="Sign In">
        <input type="reset" value="Clear">
    </form>
</div>

</body>
</html>
